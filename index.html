  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    var PDF_URL = "/yangji_reborn/yangji_guide.pdf";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    var container = document.getElementById("pdf-pages");
    var loading = document.getElementById("loading");

    async function renderPdf() {
      try {
        var pdf = await pdfjsLib.getDocument(PDF_URL).promise;

        loading.textContent = "총 " + pdf.numPages + "페이지를 불러오는 중입니다.";

        for (var pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
          var page = await pdf.getPage(pageNumber);

          var baseViewport = page.getViewport({ scale: 1 });
          var containerWidth = Math.min(container.clientWidth, 940);
          var scale = containerWidth / baseViewport.width;
          var outputScale = window.devicePixelRatio || 1;
          var viewport = page.getViewport({ scale: scale * outputScale });

          var pageBox = document.createElement("div");
          pageBox.className = "page";

          var canvas = document.createElement("canvas");
          var context = canvas.getContext("2d");

          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          canvas.style.width = "100%";
          canvas.style.height = "auto";

          pageBox.appendChild(canvas);
          container.appendChild(pageBox);

          await page.render({
            canvasContext: context,
            viewport: viewport
          }).promise;
        }

        loading.style.display = "none";
      } catch (error) {
        loading.textContent = "PDF를 불러오지 못했습니다. 오른쪽 위의 PDF 다운로드 버튼을 눌러 확인하세요.";
        console.error(error);
      }
    }

    renderPdf();
  </script>

</body>

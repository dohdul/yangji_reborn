<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>양지마을 전자서명 동의서 가이드</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f1117;
      color: #ffffff;
      font-family: Arial, "Noto Sans KR", sans-serif;
    }

    header {
      height: 66px;
      background: #111318;
      border-bottom: 1px solid #2a2d35;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
    }

    .sub {
      margin-left: 12px;
      color: #9aa3b2;
      font-weight: 500;
      font-size: 15px;
    }

    .download {
      background: #222631;
      color: #fff;
      text-decoration: none;
      padding: 13px 20px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
    }

    .download:hover {
      background: #303544;
    }

    main {
      padding: 36px 16px 80px;
    }

    .pdf-wrap {
      max-width: 940px;
      height: calc(100vh - 120px);
      margin: 0 auto;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .notice {
      max-width: 940px;
      margin: 16px auto 0;
      color: #aeb6c5;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 700px) {
      header {
        height: auto;
        padding: 12px 14px;
        gap: 10px;
      }

      .title {
        font-size: 14px;
      }

      .sub {
        display: none;
      }

      .download {
        font-size: 13px;
        padding: 10px 12px;
      }

      main {
        padding: 18px 8px 50px;
      }

      .pdf-wrap {
        height: calc(100vh - 90px);
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <span class="title">양지마을_전자서명_동의서_가이드안내</span>
      <span class="sub">가이드</span>
    </div>

    <a class="download" href="guide.pdf" download>
      PDF 다운로드
    </a>
  </header>

  <main>
    <div class="pdf-wrap">
      <iframe src="guide.pdf"></iframe>
    </div>

    <p class="notice">
      PDF가 보이지 않으면 오른쪽 위의 PDF 다운로드 버튼을 눌러 확인하세요.
    </p>
  </main>
</body>
</html>
